        :root {
            --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-400: #1D9E75; --teal-600: #0F6E51;

        .dark-theme {
            --bg: #0B0F19; --bg-secondary: #151B2C; --text: #F3F4F6; --text-secondary: #9CA3AF;
            --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.15);
        }
        body { font-family: var(--font); background-color: var(--bg); color: var(--text); transition: background-color 0.3s, color 0.3s; line-height: 1.6; -webkit-font-smoothing: antialiased; }
